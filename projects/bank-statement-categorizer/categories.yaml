# Bank Statement Categories
# Each category contains a list of regex patterns matched case-insensitively
# against the normalised transaction description.
# First match wins. The 'misc' catch-all at the bottom matches everything else.
# Edit freely — changes take effect on the next run (no restart needed).

categories:
  opal_card:
    - "opal|transport for nsw|tfnsw|sydney trains|sydney buses|nsw trains|metro trains"

  petrol:
    - "bp |caltex|ampol|shell |mobil|7-eleven.*fuel|petrol|servo|united petroleum|puma energy"

  groceries:
    - "woolworths|coles|aldi|iga|harris farm|costco|fruit.?market|foodland|drakes supermarket|spar "

  takeaway:
    - "uber eats|doordash|menulog|deliveroo|mcdonald|kfc|hungry jack|domino|subway|grill'd|nando|oporto|guzman|el jannah|red rooster|oporto|chicken treat|chatime|boost juice|zambrero"

  dining:
